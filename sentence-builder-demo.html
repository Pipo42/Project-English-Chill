<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Builder — English & Chill</title>
<style>
@font-face {
  font-family: 'Manrope';
  src: url('assets/fonts/manrope/Manrope-VariableFont_wght.woff2') format('woff2');
  font-weight: 200 800; font-style: normal; font-display: block;
}
@font-face {
  font-family: 'Caveat Brush';
  src: url('assets/fonts/caveat-brush/caveat-brush-v12-latin-regular.woff2') format('woff2');
  font-weight: 400; font-style: normal; font-display: block;
}

:root {
  --color-base:     #ffffff;
  --color-contrast: #191919;
  --color-accent-1: #99aebb;
  --color-accent-2: #F7E6FF;
  --color-accent-3: #560319;
  --color-accent-4: #5F5F5F;
  --color-accent-5: #D7D3CC;
  --font-body: 'Manrope', system-ui, sans-serif;
  --button-radius: 0.75em;
  --button-outline: #000;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  font-family: var(--font-body);
  color: var(--color-contrast);
  background: var(--color-accent-1);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(30px, 5vw, 60px) 1.5rem;
}

/* ── Card wrapper ── */
.builder-card {
  background: var(--color-base);
  border-radius: 18px;
  box-shadow: 0 6px 40px rgba(0,0,0,0.13);
  padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1.5rem, 4vw, 3rem);
  width: 100%;
  max-width: 780px;
}

/* ── Title ── */
.builder-title {
  font-family: 'Caveat Brush', cursive;
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--color-accent-3);
  text-align: center;
  margin-bottom: 0.2rem;
}
.builder-subtitle {
  text-align: center;
  color: var(--color-accent-4);
  font-size: 0.9rem;
  margin-bottom: 1.8rem;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.8rem;
}

/* Mode buttons — reuse fancy-button style */
.fancy-button {
  --button-outline: #000;
  display: inline-block;
  position: relative;
  cursor: pointer;
  border: none;
  background: transparent;
  padding: 0;
  font-family: var(--font-body);
  font-size: 1rem;
  text-decoration: none;
}
.fancy-button::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--button-radius);
  background: var(--button-outline);
}
.fancy-button .button_top {
  position: relative;
  display: inline-block;
  padding: 0.55em 1.1em;
  border-radius: var(--button-radius);
  border: 1px solid var(--button-outline);
  background: var(--color-base);
  color: var(--button-outline);
  font-family: inherit;
  font-size: inherit;
  font-weight: 600;
  transform: translateY(-3px);
  transition: transform 0.15s ease;
  white-space: nowrap;
  cursor: pointer;
}
.fancy-button:hover .button_top  { transform: translateY(-5px); }
.fancy-button:active .button_top { transform: translateY(0); }

.fancy-button.active-mode .button_top {
  background: var(--color-accent-3);
  border-color: var(--color-accent-3);
  color: #fff;
}
.fancy-button.active-mode::before { background: var(--color-accent-3); }

/* Tense select */
.tense-select {
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 0.55em 1.1em;
  border: 1.5px solid var(--color-contrast);
  border-radius: var(--button-radius);
  background: var(--color-base);
  color: var(--color-contrast);
  cursor: pointer;
  outline: none;
  font-weight: 600;
  transition: border-color 0.2s;
}
.tense-select:hover { border-color: var(--color-accent-3); }

/* ── Stage ── */
.stage-wrap {
  background: #fff8f7;
  border: 2px dashed rgba(86,3,25,0.25);
  border-radius: 14px;
  padding: 1.5rem 1rem;
  min-height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 1.4rem;
  overflow: hidden;
  position: relative;
}

.stage-hint {
  font-family: 'Caveat Brush', cursive;
  color: rgba(86,3,25,0.3);
  font-size: 1.4rem;
  pointer-events: none;
}

/* ── Pieces ── */
.piece {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  border-radius: 12px;
  padding: 10px 20px;
  opacity: 0;
  position: relative;
  /* slide direction set via JS inline style */
}
.piece.slide-in {
  animation: slideIn 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
}
@keyframes slideIn {
  from { opacity: 0; transform: var(--from-pos, translateX(-120px)); }
  to   { opacity: 1; transform: translateX(0); }
}

.piece-word {
  font-family: 'Caveat Brush', cursive;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.1;
}
.piece-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  opacity: 0.75;
}

/* Color variants */
.p-subject  { background: #ddeeff; color: #0a3566; border: 1.5px solid #aaccee; }
.p-aux      { background: #ede9fb; color: #3a2880; border: 1.5px solid #c0b0f0; }
.p-verb     { background: #dff2e1; color: #14501e; border: 1.5px solid #9ad4a0; }
.p-not      { background: #fde8e8; color: var(--color-accent-3); border: 1.5px solid rgba(86,3,25,0.35); }
.p-object   { background: #fef4dc; color: #6b4000; border: 1.5px solid #f0d070; }
.p-time     { background: #e8f8f0; color: #0e5535; border: 1.5px solid #80d4aa; }

/* Plus connector between pieces */
.piece-plus {
  font-size: 1.2rem;
  color: rgba(86,3,25,0.35);
  font-weight: 300;
  opacity: 0;
  transition: opacity 0.3s;
  align-self: center;
}
.piece-plus.show { opacity: 1; }

/* ── Example sentence ── */
.example-wrap {
  border-left: 4px solid var(--color-accent-3);
  padding: 12px 16px;
  border-radius: 0 10px 10px 0;
  background: #fff8f7;
  margin-bottom: 1.8rem;
  min-height: 50px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.example-wrap.show { opacity: 1; }
.example-label {
  font-family: 'Caveat Brush', cursive;
  color: var(--color-accent-3);
  font-size: 1rem;
  white-space: nowrap;
}
.example-sentence {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--color-contrast);
}

/* ── Play button ── */
.play-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 1.5rem;
}
.btn-play {
  --button-outline: var(--color-accent-3);
}
.btn-play .button_top {
  background: #fff0f0;
  border-color: var(--color-accent-3);
  color: var(--color-accent-3);
  padding: 0.6em 2em;
  font-size: 1.05rem;
}
.btn-play::before { background: var(--color-accent-3); }

/* ── Legend ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 18px;
  justify-content: center;
  padding-top: 1.2rem;
  border-top: 1px solid var(--color-accent-5);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.8rem;
  color: var(--color-accent-4);
  font-weight: 600;
}
.legend-swatch {
  width: 14px; height: 14px;
  border-radius: 4px;
  display: inline-block;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="builder-card">
  <h1 class="builder-title">Sentence Builder</h1>
  <p class="builder-subtitle">Watch the pieces come together — then study the example.</p>

  <!-- Controls -->
  <div class="controls">
    <button class="fancy-button active-mode" onclick="setMode('affirmative',this)">
      <span class="button_top">✔ Affirmative</span>
    </button>
    <button class="fancy-button" onclick="setMode('negative',this)">
      <span class="button_top">✘ Negative</span>
    </button>
    <button class="fancy-button" onclick="setMode('question',this)">
      <span class="button_top">? Question</span>
    </button>
    <select class="tense-select" onchange="setTense(this.value)">
      <option value="ps">Present Simple</option>
      <option value="pc">Present Continuous</option>
      <option value="pp">Past Simple</option>
      <option value="ppc">Present Perfect</option>
      <option value="f">Future (will)</option>
    </select>
  </div>

  <!-- Stage -->
  <div class="stage-wrap" id="stage">
    <span class="stage-hint">Press Play ▶</span>
  </div>

  <!-- Example -->
  <div class="example-wrap" id="example-wrap">
    <span class="example-label">Example</span>
    <span class="example-sentence" id="example-text"></span>
  </div>

  <!-- Play -->
  <div class="play-wrap">
    <button class="fancy-button btn-play" onclick="playAnimation()">
      <span class="button_top">▶ Play</span>
    </button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:#ddeeff;border:1.5px solid #aaccee"></span>Subject</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#ede9fb;border:1.5px solid #c0b0f0"></span>Auxiliary</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#dff2e1;border:1.5px solid #9ad4a0"></span>Verb</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#fde8e8;border:1.5px solid rgba(86,3,25,.35)"></span>Not</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#fef4dc;border:1.5px solid #f0d070"></span>Object</div>
  </div>
</div>

<script>
const TENSES = {
  ps: {
    affirmative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: 'plays', label: 'Verb (+s/es)', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
        { word: 'every day', label: 'Time', cls: 'p-time' },
      ],
      example: 'She plays the guitar every day.'
    },
    negative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: "doesn't", label: 'Auxiliary', cls: 'p-aux' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: "She doesn't play the guitar."
    },
    question: {
      pieces: [
        { word: 'Does', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'she', label: 'Subject', cls: 'p-subject' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar?', label: 'Object', cls: 'p-object' },
      ],
      example: 'Does she play the guitar?'
    }
  },
  pc: {
    affirmative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: 'is', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'playing', label: 'Verb + -ing', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: 'She is playing the guitar right now.'
    },
    negative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: 'is', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'not', label: 'Negation', cls: 'p-not' },
        { word: 'playing', label: 'Verb + -ing', cls: 'p-verb' },
      ],
      example: "She isn't playing the guitar right now."
    },
    question: {
      pieces: [
        { word: 'Is', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'she', label: 'Subject', cls: 'p-subject' },
        { word: 'playing', label: 'Verb + -ing', cls: 'p-verb' },
        { word: 'the guitar?', label: 'Object', cls: 'p-object' },
      ],
      example: 'Is she playing the guitar?'
    }
  },
  pp: {
    affirmative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: 'played', label: 'Verb (past)', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
        { word: 'yesterday', label: 'Time', cls: 'p-time' },
      ],
      example: 'She played the guitar yesterday.'
    },
    negative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: "didn't", label: 'Auxiliary', cls: 'p-aux' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: "She didn't play the guitar."
    },
    question: {
      pieces: [
        { word: 'Did', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'she', label: 'Subject', cls: 'p-subject' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar?', label: 'Object', cls: 'p-object' },
      ],
      example: 'Did she play the guitar?'
    }
  },
  ppc: {
    affirmative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: 'has', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'played', label: 'Past Participle', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: 'She has played the guitar before.'
    },
    negative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: "hasn't", label: 'Auxiliary', cls: 'p-aux' },
        { word: 'played', label: 'Past Participle', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: "She hasn't played the guitar yet."
    },
    question: {
      pieces: [
        { word: 'Has', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'she', label: 'Subject', cls: 'p-subject' },
        { word: 'ever played', label: 'Past Participle', cls: 'p-verb' },
        { word: 'the guitar?', label: 'Object', cls: 'p-object' },
      ],
      example: 'Has she ever played the guitar?'
    }
  },
  f: {
    affirmative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: 'will', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: 'She will play the guitar tomorrow.'
    },
    negative: {
      pieces: [
        { word: 'She', label: 'Subject', cls: 'p-subject' },
        { word: "won't", label: 'Auxiliary', cls: 'p-aux' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar', label: 'Object', cls: 'p-object' },
      ],
      example: "She won't play the guitar tomorrow."
    },
    question: {
      pieces: [
        { word: 'Will', label: 'Auxiliary', cls: 'p-aux' },
        { word: 'she', label: 'Subject', cls: 'p-subject' },
        { word: 'play', label: 'Verb (base)', cls: 'p-verb' },
        { word: 'the guitar?', label: 'Object', cls: 'p-object' },
      ],
      example: 'Will she play the guitar tomorrow?'
    }
  }
};

let mode = 'affirmative';
let tense = 'ps';
let timer = null;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.fancy-button:not(.btn-play)').forEach(b => b.classList.remove('active-mode'));
  btn.classList.add('active-mode');
  reset();
}

function setTense(v) {
  tense = v;
  reset();
}

function reset() {
  if (timer) clearTimeout(timer);
  const stage = document.getElementById('stage');
  stage.innerHTML = '<span class="stage-hint">Press Play ▶</span>';
  const ex = document.getElementById('example-wrap');
  ex.classList.remove('show');
}

function playAnimation() {
  if (timer) clearTimeout(timer);
  const data = TENSES[tense][mode];
  const stage = document.getElementById('stage');
  const exWrap = document.getElementById('example-wrap');
  const exText = document.getElementById('example-text');

  stage.innerHTML = '';
  exWrap.classList.remove('show');

  const n = data.pieces.length;

  data.pieces.forEach((p, i) => {
    // piece element
    const el = document.createElement('div');
    el.className = 'piece ' + p.cls;
    el.innerHTML = `<span class="piece-word">${p.word}</span><span class="piece-label">${p.label}</span>`;

    // direction: left half comes from left, right half from right
    const fromLeft = i < Math.ceil(n / 2);
    el.style.setProperty('--from-pos', fromLeft ? 'translateX(-140px)' : 'translateX(140px)');

    // plus connector (except after last)
    const plus = document.createElement('span');
    plus.className = 'piece-plus';
    plus.textContent = '+';

    stage.appendChild(el);
    if (i < n - 1) stage.appendChild(plus);

    const delay = i * 280;

    setTimeout(() => {
      el.classList.add('slide-in');
      if (i > 0) {
        const prevPlus = stage.querySelectorAll('.piece-plus')[i - 1];
        if (prevPlus) prevPlus.classList.add('show');
      }
    }, delay);
  });

  timer = setTimeout(() => {
    exText.textContent = data.example;
    exWrap.classList.add('show');
  }, n * 280 + 200);
}
</script>
</body>
</html>
