  <div class="smoke" style="left: 40%; animation-delay: -3s;"></div>
  <div class="smoke" style="left: 60%; animation-delay: -1s;"></div>
  <div class="smoke" style="left: 45%; animation-delay: -4s;"></div>
  <div class="smoke" style="left: 55%; animation-delay: -2.5s;"></div>
  <div class="smoke" style="left: 50%; animation-delay: -3.5s;"></div>

  <style>
    .smoke {
      position: absolute;
      bottom: 0;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: rise 4s infinite ease-in-out;
      pointer-events: none; /* ← añadido */
    }

    @keyframes rise {
      0% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 0.4;
      }
      50% {
        transform: translateX(-10px) translateY(-60px) scale(1.2);
        opacity: 0.2;
      }
      100% {
        transform: translateX(10px) translateY(-120px) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</div>
